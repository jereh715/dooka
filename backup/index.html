<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dooka - Home</title>
    <link rel="stylesheet" href="style.css"> <style>
        :root { --primary: #2c3e50; --bg: #f4f7f6; --text-main: #2c3e50; --text-dim: #7f8c8d; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text-main); padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { font-size: 1.5rem; }
    </style>
</head>
<body>
    <h1>Dashboard</h1>
    <div class="card">
        <p>System Status: <span style="color: #27ae60; font-weight: bold;">● Online</span></p>
        <p style="font-size: 0.9em; color: var(--text-dim);">Welcome to Dooka Core. Use the navigation to manage your modules.</p>
    </div>
</body>
</html>
