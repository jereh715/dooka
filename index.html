<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dooka app</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f7f6; }
        #update-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9);
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .container { padding: 40px; }
    </style>
</head>
<body>

    <div id="update-overlay">
        <h2>Updating Dooka...</h2>
        <p>Please wait while we sync your modules.</p>
    </div>

    <div class="container" id="main-content">
        <h1> Welcome Dooka</h1>
        <p>Ready to work.</p>
    </div>

    <script>
        async function checkInitialStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                if (data.is_updating) {
                    document.getElementById('update-overlay').style.display = 'flex';
                    document.getElementById('main-content').style.opacity = '0.3';
                }
            } catch (e) {
                console.log("Offline or server initializing.");
            }
        }

        // Run ONCE on load. No setInterval.
        window.onload = checkInitialStatus;
    </script>
</body>
</html>
