<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dooka</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); padding-bottom: 70px; }
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: white; display: flex; justify-content: space-around;
            padding: 15px 0; border-top: 1px solid #ddd; z-index: 100;
        }
        .nav-item { cursor: pointer; color: #7f8c8d; font-weight: bold; text-align: center; flex: 1; font-size: 0.8em; }
        .nav-item.active { color: var(--accent); }
        .view { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .view.active { display: block; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        input, button { display: block; width: 100%; margin: 12px 0; padding: 14px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        #status-msg { margin-top: 15px; font-weight: bold; text-align: center; color: var(--accent); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="home" class="view active">
        <h1>Dooka Dashboard</h1>
        <div class="card"><p>System Status: <span style="color: #27ae60;">Online</span></p></div>
    </div>

    <div id="dev" class="view">
        <h1>Dev Portal</h1>
        <div class="card">
            <h3>Module Deployment</h3>
            <p style="font-size: 0.85em; color: #7f8c8d;">Select a folder or a file to push to GitHub.</p>
            <input type="text" id="moduleName" placeholder="Module Name (e.g. pos_app)">
            <input type="file" id="moduleFolder" webkitdirectory directory multiple>
            <button onclick="publishModule()">Push to GitHub</button>
            <div id="status-msg"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchView('home', this)">HOME</div>
        <div class="nav-item" onclick="switchView('dev', this)">DEV</div>
    </nav>

    <script>
        function switchView(viewId, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            el.classList.add('active');
        }

        async function publishModule() {
            const name = document.getElementById('moduleName').value;
            const folderInput = document.getElementById('moduleFolder');
            const status = document.getElementById('status-msg');

            if (!name || folderInput.files.length === 0) {
                status.innerText = "⚠️ Missing name or files";
                return;
            }

            status.innerText = "🚀 Syncing with GitHub...";
            const formData = new FormData();
            formData.append('module_name', name);

            for (let file of folderInput.files) {
                // webkitRelativePath is the secret to folder structure
                formData.append('files', file, file.webkitRelativePath || file.name);
            }

            try {
                const response = await fetch('/api/upload-module', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                status.innerText = result.success ? "✅ Success!" : "❌ " + result.error;
            } catch (e) {
                status.innerText = "❌ Backend connection error.";
            }
        }
    </script>
</body>
</html>
