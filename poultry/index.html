<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dooka | Business OS</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text: #1e293b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            text-align: center;
            width: 80%;
            max-width: 400px;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:active {
            opacity: 0.8;
        }
        #status {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Dooka Notifications</h2>
        <p>Test the refined Android notification system.</p>
        
        <button onclick="sendTestNotification()">Push Alert</button>
        
        <div id="status">Ready</div>
    </div>

    <script>
        async function sendTestNotification() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "Sending...";

            try {
                const response = await fetch('/api/notifications/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: "Dooka Business OS",
                        message: "This is a test notification from the app shell."
                    })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    statusDiv.innerText = "✅ Notification Sent!";
                    statusDiv.style.color = "green";
                } else if (response.status === 403) {
                    // This handles the 'Permission Required' response from app.py
                    statusDiv.innerText = "⚠️ Permission requested. Please allow and try again.";
                    statusDiv.style.color = "orange";
                } else {
                    statusDiv.innerText = "❌ Error: " + (result.error || "Unknown");
                    statusDiv.style.color = "red";
                }
            } catch (err) {
                statusDiv.innerText = "❌ Connection failed.";
                statusDiv.style.color = "red";
            }
        }
    </script>
</body>
</html>
