<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dooka Shell</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f0f2f5; }
        button { padding: 15px 25px; font-size: 16px; color: white; background: #007bff; border: none; border-radius: 8px; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #0056b3; }
        .status { margin-top: 20px; color: #555; }
    </style>
</head>
<body>

    <h1>Dooka Module</h1>
    <button onclick="sendNotification()">Send Notification</button>
    <div id="status" class="status"></div>

    <script>
        async function sendNotification() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "Sending...";

            try {
                const response = await fetch('/api/notifications/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: "Hello from Dooka!",
                        message: "This is a cross-platform notification."
                    })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    statusDiv.innerText = "✅ Notification sent!";
                } else {
                    // If permissions.handle_request returns "request", 
                    // Android will pop up the system dialog.
                    statusDiv.innerText = "❌ Error: " + (result.error || "Permission required");
                }
            } catch (err) {
                statusDiv.innerText = "❌ Network error.";
                console.error(err);
            }
        }
    </script>
</body>
</html>
