<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dooka Camera Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background: #f4f7f6; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { 
            padding: 12px 24px; font-size: 16px; border: none; border-radius: 6px;
            cursor: pointer; margin: 10px; transition: 0.2s;
        }
        .btn-check { background: #6c757d; color: white; }
        .btn-request { background: #28a745; color: white; }
        #log { margin-top: 20px; padding: 10px; background: #eee; border-radius: 4px; font-family: monospace; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Camera Permission</h2>
        <button class="btn-check" onclick="manageCamera('check')">Check Status</button>
        <button class="btn-request" onclick="manageCamera('request')">Request Permission</button>
        <div id="log">Waiting for action...</div>
    </div>

    <script>
        async function manageCamera(action) {
            const log = document.getElementById('log');
            log.innerText = `Sending ${action} request...`;

            try {
                // Hits @server.route('/api/permissions/<name>/<action>') in app.py
                const response = await fetch(`/api/permissions/camera/${action}`);
                const data = await response.json();
                
                log.innerText = `Result: ${data.granted ? "GRANTED" : "DENIED/PENDING"}`;
                console.log("Response:", data);
            } catch (err) {
                log.innerText = "Error connecting to Flask server.";
                console.error(err);
            }
        }
    </script>
</body>
</html>
