<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dooka | Camera Test</title>
    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background: #f8fafc; 
        }
        video { 
            width: 90%; 
            max-width: 500px; 
            border-radius: 12px; 
            background: #000;
            margin-top: 20px;
        }
        button {
            padding: 12px 24px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 20px;
        }
        #status { margin-top: 10px; color: #64748b; }
    </style>
</head>
<body>
    <h2>Hardware Access</h2>
    <video id="webcam" autoplay playsinline></video>
    <button onclick="startCamera()">Open Camera</button>
    <div id="status">Status: Waiting</div>

    <script>
        async function startCamera() {
            const status = document.getElementById('status');
            const video = document.getElementById('webcam');
            
            status.innerText = "Status: Requesting Permission...";
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                video.srcObject = stream;
                status.innerText = "Status: Online ✅";
            } catch (err) {
                console.error(err);
                status.innerText = "Status: Error - " + err.message;
            }
        }
    </script>
</body>
</html>
